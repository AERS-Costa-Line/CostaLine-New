			{
				"@context": "https://schema.org",
				"@type": "HowTo",
				"name": "Cómo Funciona Nuestro Proceso de Envío de Paquetería",
				"description": "Una guía paso a paso que detalla el proceso de envío de Costa Line, desde la recepción del paquete en la terminal de origen hasta su entrega al destinatario.",
				"step": [
					{
						"@type": "HowToStep",
						"name": "Paso 1: Documentación y Pesaje en Origen",
						"text": "Presenta tu paquete en el mostrador de paquetería de nuestras terminales. Lo pesaremos, mediremos y generaremos una guía de envío con todos los datos."
					},
					{
						"@type": "HowToStep",
						"name": "Paso 2: Preparación y Abordaje Seguro",
						"text": "Tu paquete es etiquetado y almacenado de forma segura, listo para ser cargado en el compartimento de equipaje del próximo autobús disponible en la ruta."
					},
					{
						"@type": "HowToStep",
						"name": "Paso 3: Tránsito en la Ruta",
						"text": "Tu paquete viaja de forma directa en nuestros autobuses, manejado por operadores profesionales y siguiendo la ruta más eficiente hacia el destino."
					},
					{
						"@type": "HowToStep",
						"name": "Paso 4: Recepción y Notificación en Destino",
						"text": "Al llegar a la terminal de destino, tu paquete es descargado y registrado en nuestro sistema. Se notifica al destinatario (vía SMS, si se proporcionó el servicio) que ya puede pasar a recogerlo."
					},
					{
						"@type": "HowToStep",
						"name": "Paso 5: Entrega al Destinatario",
						"text": "El destinatario se presenta en el mostrador con el número de guía y una identificación oficial para recibir el paquete. ¡Misión cumplida!"
					}
				],
				"publisher": {
					"@type": "Organization",
					"name": "Costa Line"
				}
			}
		</script>
