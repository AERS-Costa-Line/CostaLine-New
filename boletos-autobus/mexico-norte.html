		<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "HowTo",
  "name": "Cómo Conectar desde la Terminal del Norte a la Terminal del Sur (Taxqueña)",
  "description": "Una guía para viajeros que llegan a la Terminal Central del Norte en CDMX y necesitan conectar con las rutas de Costa Line hacia el sur.",
  "publisher": {
    "@type": "Organization",
    "name": "Costa Line"
  },
  "step": [
    {
      "@type": "HowToStep",
      "name": "Paso 1: Llega a la Terminal Central del Norte",
      "text": "Una vez que llegues a la Terminal del Norte, el siguiente paso es trasladarte a la Terminal del Sur (Taxqueña), de donde parten nuestras corridas a Acapulco, Ixtapa, etc."
    },
    {
      "@type": "HowToStep",
      "name": "Paso 2: Usa el Metro de la CDMX",
      "text": "La forma más directa y económica es usar el Metro. La estación 'Autobuses del Norte' (Línea 5, amarilla) está conectada directamente con la terminal."
    },
    {
      "@type": "HowToStep",
      "name": "Paso 3: Sigue la Ruta del Metro",
      "text": "Toma la Línea 5 dirección 'Pantitlán' y transborda en 'La Raza' a la Línea 3. Ahí, toma dirección 'Universidad' y baja en la estación 'Tasqueña' (es la terminal de la Línea 2 azul, que también te conecta)."
    },
    {
      "@type": "HowToStep",
      "name": "Paso 4: ¡Bienvenido a la Terminal del Sur!",
      "text": "La estación de metro 'Tasqueña' te deja justo en la Terminal del Sur. Busca nuestros mostradores de Costa Line para comprar tu boleto o, si ya lo reservaste en línea, prepárate para abordar. ¡Buen viaje al sur!"
    }
  ]
}
</script>
